<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>안내</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f4f8}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:560px;padding:48px;text-align:center}
.icon{font-size:64px;margin-bottom:16px}
h1{color:#e74c3c;margin-bottom:12px;font-size:24px}
p{color:#555;line-height:1.8;font-size:15px}
.highlight{background:#fff3cd;border-left:4px solid #ffc107;padding:12px 16px;margin:20px 0;text-align:left;border-radius:4px;font-size:14px;line-height:1.7}
.tips{background:#e8f5e9;border-left:4px solid #27ae60;padding:12px 16px;margin:20px 0;text-align:left;border-radius:4px;font-size:13px;line-height:1.8}
.tips strong{color:#27ae60}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#9888;&#65039;</div>
  <h1>악성메일 대응 훈련 안내</h1>
  <p>본 메일은 <strong>침해사고 대응 훈련</strong>의 일환으로<br>발송된 <strong>모의 악성메일</strong>입니다.</p>
  <div class="highlight">
    <strong>&#128204; 주의</strong><br>
    실제 악성메일이었다면 개인정보가 유출되거나<br>
    악성코드에 감염될 수 있었습니다.
  </div>
  <div class="tips">
    <strong>&#9989; 악성메일 예방 수칙</strong><br>
    &#8226; 출처가 불분명한 메일의 링크/첨부파일을 클릭하지 마세요<br>
    &#8226; 발신자 주소를 꼼꼼히 확인하세요<br>
    &#8226; 의심스러운 메일은 정보보안팀에 즉시 신고해 주세요
  </div>
  <p style="margin-top:16px;font-size:13px;color:#999">본 훈련은 임직원 보안 인식 제고를 위해 실시되었습니다.</p>
</div>

<script>
(function() {
  try {
    const params = new URLSearchParams(location.search);
    const linkNumber = parseInt(params.get('l'));
    const token = params.get('t');
    if (!token || (linkNumber !== 1 && linkNumber !== 2)) return;

    const data = JSON.parse(localStorage.getItem('pt_data') || '{"participants":[],"clicks":[]}');
    const participant = data.participants.find(p => p.token === token);
    if (!participant) return;

    data.clicks.push({
      participantId: participant.id,
      linkNumber: linkNumber,
      time: new Date().toISOString()
    });
    localStorage.setItem('pt_data', JSON.stringify(data));
  } catch(e) {}
})();
</script>
</body>
</html>
